<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HoloCard – Premium Digital Business Cards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08080A;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(79,70,229,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 90% 90%, rgba(147,51,234,0.18) 0%, transparent 60%);
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #818CF8, #C084FC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .tagline {
      color: rgba(255,255,255,0.55);
      font-size: 16px;
      margin-bottom: 40px;
      max-width: 360px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #4F46E5, #9333EA);
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(79,70,229,0.35);
    }
    .sub {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      margin-top: 48px;
    }
    .card-preview {
      width: 320px;
      height: 200px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,255,255,0.08);
      margin: 32px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .card-preview::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(0,229,255,0.12),
        rgba(213,0,249,0.12),
        rgba(255,23,68,0.08),
        rgba(0,230,118,0.08));
    }
    .card-text {
      position: relative;
      z-index: 1;
    }
    .card-name { font-size: 22px; font-weight: 900; letter-spacing: 0.2px; }
    .card-title { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="logo">HoloCard</div>
  <p class="tagline">Premium 3D holographic digital business cards with live reviews, QR scanning & gyroscope effects.</p>

  <div class="card-preview">
    <div class="card-text">
      <div class="card-name">Your Name</div>
      <div class="card-title">Your Title • Your Company</div>
    </div>
  </div>

  <a class="badge" href="https://play.google.com/store/apps/details?id=com.holocard.app">
    ↓ Download on Google Play
  </a>

  <p class="sub">© 2025 HoloCard · holocard.club</p>
</body>
</html>
